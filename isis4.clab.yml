name: isis4

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:latest
      type: ixr-d2l

  nodes:
    r1:
      kind: nokia_srlinux
      startup-config: configs/r1.cfg
    r2:
      kind: nokia_srlinux
      startup-config: configs/r2.cfg
    r3:
      kind: nokia_srlinux
      startup-config: configs/r3.cfg
    r4:
      kind: nokia_srlinux
      startup-config: configs/r4.cfg

  links:
    - endpoints: ["r1:e1-1", "r2:e1-1"]
    - endpoints: ["r2:e1-2", "r3:e1-1"]
    - endpoints: ["r3:e1-2", "r4:e1-1"]
    - endpoints: ["r4:e1-2", "r1:e1-2"]
